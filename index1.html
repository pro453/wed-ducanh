<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ôn thi vào lớp 10</title>

<style>

body{
margin:0;
font-family: Arial;
background:#f3f3f3;
}

/* header */
.header{
background: linear-gradient(135deg,#4f46e5,#d946ef);
color:white;
text-align:center;
padding:120px 20px;
border-bottom-left-radius:80px;
border-bottom-right-radius:80px;
}

.header h1{
font-size:50px;
margin:10px;
}

/* container */
.container{
padding:40px;
text-align:center;
}

/* cards */
.cards{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
width:220px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.btn{
margin-top:15px;
padding:10px 20px;
border:none;
background:linear-gradient(135deg,#4f46e5,#d946ef);
color:white;
border-radius:10px;
cursor:pointer;
}

/* form section */
#formSection{
display:none;
padding:40px;
text-align:center;
}

.khung{
width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<!-- Trang chọn đề -->
<div id="home">

<div class="header">
<h1>Ôn thi Tuyển sinh vào 10 nhé</h1>
<p>Không được tra Google nha — Chấm điểm tự động</p>
</div>

<div class="container">

<h2>Chọn đề thi</h2>

<div class="cards">

<div class="card">
<h3>Test Toán</h3>
<p>90 phút • 50 câu</p>
<button class="btn" onclick="startTest()">Bắt đầu</button>
</div>

</div>

</div>

</div>

<!-- Trang làm bài -->
<div id="formSection">

<h1>Bài thi Toán</h1>

<div class="khung">

<iframe 
src="https://forms.gle/b1h4vnPWMWxDyWNg7"
width="100%" 
height="900"
frameborder="0">
</iframe>

</div>

</div>

<script>

function startTest(){
document.getElementById("home").style.display="none";
document.getElementById("formSection").style.display="block";
window.scrollTo(0,0);
}

</script>

</body>
</html>
